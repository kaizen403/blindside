services:
  postgres:
    image: postgres:16-alpine
    container_name: blindside-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blindside
      POSTGRES_PASSWORD: blindside_dev
      POSTGRES_DB: blindside
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - blindside_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blindside -d blindside"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  blindside_pgdata:
    driver: local
